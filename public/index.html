<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multiplayer Checkboxes</title>
    <style>
      body {
        background-color: #0f291e;
        color: #4ade80;
        font-family: system-ui, -apple-system, sans-serif;
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      h1 {
        margin-bottom: 20px;
      }
      #container {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        justify-content: center;
        max-width: 90vw;
      }
      input[type="checkbox"] {
        accent-color: #22c55e;
        cursor: pointer;
        width: 16px;
        height: 16px;
        margin: 0;
      }
      /* Modal Styles */
      #modal-overlay, #admin-modal-overlay, #error-modal-overlay {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }
      .modal {
        background: #113322;
        padding: 30px;
        border-radius: 8px;
        border: 2px solid #22c55e;
        text-align: center;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      }
      .modal input {
        padding: 10px;
        font-size: 16px;
        border: 1px solid #22c55e;
        border-radius: 4px;
        background: #0f291e;
        color: #4ade80;
        margin-bottom: 15px;
        width: 80%;
      }
      .modal button {
        padding: 10px 20px;
        background: #22c55e;
        color: #0f291e;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
        font-weight: bold;
      }
      .modal button:hover {
        background: #4ade80;
      }
      /* Tooltip Styles */
      #tooltip {
        position: fixed;
        background: #22c55e;
        color: #0f291e;
        padding: 5px 10px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: bold;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.1s;
        z-index: 500;
        white-space: nowrap;
        box-shadow: 0 2px 5px rgba(0,0,0,0.3);
      }
      #reset-btn {
        position: fixed;
        top: 20px;
        right: 20px;
        background: #b91c1c;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
      }
      #reset-btn:hover {
        background: #dc2626;
      }
    </style>
  </head>
  <body>
    <button id="reset-btn">Reset</button>

    <div id="modal-overlay">
      <div class="modal">
        <h2>Welcome</h2>
        <p>Please enter your username:</p>
        <input type="text" id="username-input" placeholder="Username" />
        <br />
        <button id="join-btn">Join</button>
      </div>
    </div>

    <div id="admin-modal-overlay" style="display: none;">
      <div class="modal">
        <h2>Admin Reset</h2>
        <p>Enter Admin Password:</p>
        <input type="password" id="admin-password-input" placeholder="Password" />
        <br />
        <button id="admin-submit-btn">Submit</button>
        <button id="admin-cancel-btn" style="background: #b91c1c; margin-left: 10px; color: white;">Cancel</button>
      </div>
    </div>

    <div id="error-modal-overlay" style="display: none;">
      <div class="modal" style="border-color: #ef4444;">
        <h2 style="color: #ef4444;">Access Denied</h2>
        <p>Incorrect Admin Password!</p>
        <button id="error-close-btn" style="background: #ef4444; color: white;">Close</button>
      </div>
    </div>

    <h1>Multiplayer Checkboxes</h1>
    <div id="container"></div>
    <div id="tooltip"></div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
